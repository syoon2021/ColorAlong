{% extends "layout.html" %}
{% block content %}
<div class="container">
    <h2>Question #10</h2>
    <hr>
    <h4>Recreate the color from memory.</h4>
    <p class="text-muted">Use the sliders to match the color you just saw.</p>

    <div class="row mt-4">
        <div class="col-md-6">
            <div id="user-color" class="border rounded" style="height: 260px;"></div>
        </div>

        <div class="col-md-6">
            <div class="card p-3 shadow-sm">
                <div class="mb-4">
                    <label for="hue" class="form-label d-flex justify-content-between">
                        <span>Hue</span>
                        <span id="hue-value">180°</span>
                    </label>
                    <input type="range" class="form-range" id="hue-match" min="0" max="360" value="180">
                </div>

                <div class="mb-4">
                    <label for="saturation" class="form-label d-flex justify-content-between">
                        <span>Saturation</span>
                        <span id="saturation-value">50%</span>
                    </label>
                    <input type="range" class="form-range" id="saturation-match" min="0" max="100" value="50">
                </div>

                <div class="mb-4">
                    <label for="lightness" class="form-label d-flex justify-content-between">
                        <span>Lightness</span>
                        <span id="lightness-value">50%</span>
                    </label>
                    <input type="range" class="form-range" id="lightness-match" min="0" max="100" value="50">
                </div>

                <div class="alert alert-light border" id="hsl-output">
                    hsl(180, 50%, 50%)
                </div>

                <button id="submit-color-match" class="btn btn-primary">Submit Answer</button>
            </div>
        </div>
    </div>

    <div id="match-result" class="mt-4 text-center"></div>
</div>

<script>
    window.colorData = {
        targetColor: {{ target_color | tojson }},
        previousResponse: {{ previous_response | tojson if previous_response else 'null' }}
    };
</script>
{% endblock %}
